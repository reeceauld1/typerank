    <script type="application/ld+json">
      {

    <script type="text/javascript">
      // Undoes the redirect trick in public/404.html so a deep link (or a
      // refresh) on a route like /profile resolves correctly on GitHub
      // Pages, which has no server-side rewrites for client-side routing.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="text/javascript">
      // Sets the theme before first paint so a resolved "light" theme
      // (explicit, or "system" on a light OS/browser — the default) doesn't
      // flash dark (the CSS default) for a frame while React mounts.
      (function () {
        try {
          var theme = window.localStorage.getItem('theme');
          var resolved =
            theme === 'light' || theme === 'dark'
              ? theme
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          if (resolved === 'light') document.documentElement.dataset.theme = 'light';
        } catch (e) {}
      })();
    </script>
    <script type="text/javascript">
      // Favicon has a black and a white variant, chosen by the browser/OS's
      // actual color scheme — deliberately independent of the site's own
      // theme setting (which can be overridden to light/dark regardless of
      // the OS), so it always stays legible against whatever chrome the
      // browser itself is drawing (tab bar, bookmarks bar, etc.).
      (function () {
        try {
          var favicon = document.getElementById('favicon');
          if (!favicon || !window.matchMedia) return;
          var media = window.matchMedia('(prefers-color-scheme: light)');
          var apply = function () {
            favicon.href = media.matches ? '%BASE_URL%typeladderBlack.svg' : '%BASE_URL%typeladderWhite.svg';
          };
          apply();
          media.addEventListener('change', apply);
        } catch (e) {}
      })();
    </script>
    <script type="text/javascript">
      // Sets the accent color before first paint from the last-known
      // equipped color (cached by UserContext on every stats refresh), so a
      // non-default color doesn't flash the CSS default blue for a frame
      // while React mounts and re-fetches the real value. Keep this hex map
      // in sync with ACCENT_COLOR_CATALOG in src/utils/accentColors.ts.
      (function () {
        try {
          var HEX = {
            green: '#5bc16f',
            purple: '#a55bd9',
            orange: '#e0913f',
            magenta: '#d1477a',
            gold: '#d9b23f',
          };
          var color = window.localStorage.getItem('accentColor');
          if (!color || color === 'blue') return; // matches the CSS default already
          var root = document.documentElement;
          if (color === 'monochrome') {
            root.dataset.accentMono = 'true';
            return;
          }
          var hex = color === 'custom' ? window.localStorage.getItem('accentHex') : HEX[color];
          if (!hex) return;
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          root.style.setProperty('--accent', hex);
          root.style.setProperty('--accent-soft', 'rgba(' + r + ', ' + g + ', ' + b + ', 0.14)');
          root.style.setProperty('--accent-glow', 'rgba(' + r + ', ' + g + ', ' + b + ', 0.03)');
        } catch (e) {}
      })();
    </script>

  <body>
