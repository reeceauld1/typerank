<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>typerank</title>
    <script type="text/javascript">
      // Undoes the redirect trick in public/404.html so a deep link (or a
      // refresh) on a route like /profile resolves correctly on GitHub
      // Pages, which has no server-side rewrites for client-side routing.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="text/javascript">
      // Sets the theme before first paint so a resolved "light" theme
      // (explicit, or "system" on a light OS/browser — the default) doesn't
      // flash dark (the CSS default) for a frame while React mounts.
      (function () {
        try {
          var theme = window.localStorage.getItem('theme');
          var resolved =
            theme === 'light' || theme === 'dark'
              ? theme
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          if (resolved === 'light') document.documentElement.dataset.theme = 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
