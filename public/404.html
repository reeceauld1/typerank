<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>typeladder</title>
    <script type="text/javascript">
      // GitHub Pages has no server-side rewrites, so it serves this file for
      // any path it doesn't recognize (e.g. a direct link to /profile).
      // This re-encodes the path into a query string and redirects to the
      // real index.html, which decodes it back (see the script in
      // index.html) so React Router picks up where the user meant to land.
      // https://github.com/rafgraph/spa-github-pages
      //
      // 0 because typeladder.com (a custom domain) serves from the root —
      // no /repo-name/ subpath to preserve. Bump to 1 if this ever moves
      // back to a plain GitHub Pages project page (username.github.io/repo-name/).
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
